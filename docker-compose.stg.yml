services:
  backend:
    image: registry.spokayhub.top/api_crisisview-main:${IMAGE_TAG:-latest}
    container_name: api_crisisview-main-stg
    env_file:
      - ./backend-stg.env
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
