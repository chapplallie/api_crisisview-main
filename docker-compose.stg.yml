services:
  backend:
    image: registry.spokayhub.top/efrei-projet-fil-rouge-cicd-backend:${IMAGE_TAG:-latest}
    container_name: efrei-projet-fil-rouge-cicd-backend-stg
    env_file:
      - ./backend-stg.env
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
